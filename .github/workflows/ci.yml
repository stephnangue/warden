name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Include `edited` so retargeting a stacked PR's base to `main`
    # triggers CI. Without it, GitHub fires pull_request.edited but the
    # default subscription ignores that event, leaving the retargeted PR
    # with no run queued until a force-push or close+reopen.
    types: [opened, synchronize, reopened, edited]
  workflow_call:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.decide.outputs.code }}
      helm: ${{ steps.decide.outputs.helm }}
      site: ${{ steps.decide.outputs.site }}
    steps:
      - uses: actions/checkout@v7
      # On release-tag pushes, the tag is placed on the same commit as
      # main, so a main...tag diff sees zero changed files and every
      # filter returns false. That would skip unit, helm-lint, and e2e
      # on the only ref where we most want them to run. Bypass the
      # filter for tag refs and force every downstream job to run.
      - uses: dorny/paths-filter@v4
        id: filter
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'e2e/**'
            helm:
              - 'deploy/helm/**'
              - '.github/workflows/ci.yml'
            site:
              - 'site/**'
              - '.github/workflows/ci.yml'
      - id: decide
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "code=true"  >> "$GITHUB_OUTPUT"
            echo "helm=true"  >> "$GITHUB_OUTPUT"
            echo "site=true"  >> "$GITHUB_OUTPUT"
          else
            echo "code=${{ steps.filter.outputs.code }}" >> "$GITHUB_OUTPUT"
            echo "helm=${{ steps.filter.outputs.helm }}" >> "$GITHUB_OUTPUT"
            echo "site=${{ steps.filter.outputs.site }}" >> "$GITHUB_OUTPUT"
          fi

  unit:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build
        run: go build -o warden .

  site:
    name: site-build
    needs: [changes]
    if: needs.changes.outputs.site == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      # Catches what would otherwise only surface in the Cloudflare deploy:
      # a page missing its `title` frontmatter, or a sidebar entry in
      # astro.config.mjs naming a slug that no longer exists.
      - name: Build
        working-directory: site
        run: npm run build

      # A broken internal link doesn't fail the build — it ships silently —
      # so crawl the built site as well.
      - name: Link check
        working-directory: site
        run: |
          npm run preview -- --port 4321 &
          for _ in $(seq 1 30); do
            curl -sf http://localhost:4321/ >/dev/null && break
            sleep 1
          done
          npx --yes linkinator http://localhost:4321 \
            --recurse \
            --skip '^https?://(?!localhost)' \
            --timeout 20000

  helm:
    name: helm-lint
    needs: [changes]
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo install -m 0755 kubeconform /usr/local/bin/

      - name: helm lint (production values)
        run: |
          helm lint deploy/helm/warden \
            --set tls.existingSecret=warden-tls \
            --set storage.existingSecret=warden-db \
            --set seal.transit.address=https://vault.example.com:8200 \
            --set seal.transit.keyName=warden-unseal \
            --set seal.transit.existingSecret=warden-seal

      - name: helm lint (dev values)
        run: |
          helm lint deploy/helm/warden \
            -f deploy/helm/warden/values-dev.yaml \
            --set tls.existingSecret=warden-tls \
            --set storage.connectionUrl='postgres://example' \
            --set seal.static.existingSecret=warden-seal \
            --set seal.static.keyId=dev

      - name: kubeconform (production values)
        run: |
          helm template warden deploy/helm/warden \
            --namespace warden \
            --set tls.existingSecret=warden-tls \
            --set storage.existingSecret=warden-db \
            --set seal.transit.address=https://vault.example.com:8200 \
            --set seal.transit.keyName=warden-unseal \
            --set seal.transit.existingSecret=warden-seal \
            | kubeconform -strict -summary -verbose

      - name: kubeconform (dev values)
        run: |
          helm template warden deploy/helm/warden \
            --namespace warden \
            -f deploy/helm/warden/values-dev.yaml \
            --set tls.existingSecret=warden-tls \
            --set storage.connectionUrl='postgres://example' \
            --set seal.static.existingSecret=warden-seal \
            --set seal.static.keyId=dev \
            | kubeconform -strict -summary -verbose

      - name: kubeconform (cert-manager values)
        run: |
          helm template warden deploy/helm/warden \
            --namespace warden \
            --set tls.certManager.enabled=true \
            --set tls.certManager.issuerRef.name=warden-ca \
            --set storage.existingSecret=warden-db \
            --set seal.transit.address=https://vault.example.com:8200 \
            --set seal.transit.keyName=warden-unseal \
            --set seal.transit.existingSecret=warden-seal \
            | kubeconform -strict -summary -verbose \
                -schema-location default \
                -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

  helm-smoke:
    name: helm-smoke
    needs: [changes]
    # Run on chart OR code changes — chart shape can break from either side.
    # See deploy/helm/warden/ci/smoke.sh for the orchestration this wraps.
    if: needs.changes.outputs.helm == 'true' || needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: warden-smoke
          wait: 60s

      - name: Run helm smoke test
        run: bash deploy/helm/warden/ci/smoke.sh warden warden warden-smoke

  e2e:
    runs-on: ubuntu-latest
    needs: [unit, changes]
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Start E2E cluster
        run: bash e2e/setup.sh

      - name: Run E2E tests
        run: go test -tags e2e -v -count=1 -p 1 -timeout 45m ./e2e/...

      - name: Teardown E2E cluster
        if: always()
        run: bash e2e/teardown.sh

  # The single status check branch protection requires. Every other job is
  # path-filtered and skips on unrelated PRs (a docs-only change skips the Go
  # jobs, a code-only change skips the site job), which would leave a directly
  # required check unsatisfied and block the merge forever. This gate always
  # runs and passes as long as nothing it depends on actually failed or was
  # cancelled — a skipped job counts as success. Require only `ci-gate`.
  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    needs: [changes, unit, site, helm, helm-smoke, e2e]
    if: always()
    steps:
      - name: Fail if any dependency failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required job did not succeed:"
          echo '${{ toJSON(needs) }}'
          exit 1
