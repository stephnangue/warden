name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Build
        run: go build -o warden .

  e2e:
    runs-on: ubuntu-latest
    needs: [unit]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Start E2E cluster
        run: bash e2e/setup.sh

      - name: Run E2E tests
        run: go test -tags e2e -v -count=1 -p 1 -timeout 45m ./e2e/...

      - name: Teardown E2E cluster
        if: always()
        run: bash e2e/teardown.sh
