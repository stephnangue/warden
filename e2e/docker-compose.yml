services:
  postgres-warden:
    image: postgres:15-alpine
    container_name: e2e-postgres-warden
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: warden
      POSTGRES_PASSWORD: wardenpassword
      POSTGRES_DB: warden
    volumes:
      - e2e-postgres-warden-data:/var/lib/postgresql/data
    networks:
      - e2e-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warden"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Vault dev server for testing gateway proxy
  vault:
    image: hashicorp/vault:1.18
    container_name: e2e-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "e2e-vault-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - e2e-network
    healthcheck:
      test: ["CMD", "vault", "status", "-tls-skip-verify"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: >
      server -dev
      -dev-root-token-id="e2e-vault-root-token"
      -dev-listen-address=0.0.0.0:8200

  # Ory Hydra — OAuth2/OIDC server for transparent mode JWT issuance
  postgres-hydra:
    image: postgres:15-alpine
    container_name: e2e-postgres-hydra
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: hydrapassword
      POSTGRES_DB: hydra
    volumes:
      - e2e-postgres-hydra-data:/var/lib/postgresql/data
    networks:
      - e2e-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra"]
      interval: 5s
      timeout: 3s
      retries: 10

  hydra-migrate:
    image: oryd/hydra:v2.2
    container_name: e2e-hydra-migrate
    environment:
      DSN: postgres://hydra:hydrapassword@postgres-hydra:5432/hydra?sslmode=disable
    networks:
      - e2e-network
    depends_on:
      postgres-hydra:
        condition: service_healthy
    command: migrate sql -e --yes

  hydra:
    image: oryd/hydra:v2.2
    container_name: e2e-hydra
    ports:
      - "4444:4444"
      - "4445:4445"
    environment:
      DSN: postgres://hydra:hydrapassword@postgres-hydra:5432/hydra?sslmode=disable
      URLS_SELF_ISSUER: http://localhost:4444
      URLS_CONSENT: http://localhost:3000/consent
      URLS_LOGIN: http://localhost:3000/login
      URLS_LOGOUT: http://localhost:3000/logout
      SECRETS_SYSTEM: e2e-secret-not-for-production
      OIDC_SUBJECT_IDENTIFIERS_SUPPORTED_TYPES: public,pairwise
      OIDC_SUBJECT_IDENTIFIERS_PAIRWISE_SALT: e2e-salt-not-for-production
      SERVE_PUBLIC_CORS_ENABLED: "true"
      SERVE_PUBLIC_CORS_ALLOWED_ORIGINS: "*"
      STRATEGIES_ACCESS_TOKEN: jwt
      TTL_ACCESS_TOKEN: 1h
      TTL_REFRESH_TOKEN: 720h
      TTL_ID_TOKEN: 1h
      LOG_LEVEL: warn
    networks:
      - e2e-network
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    command: serve all --dev

  # Nginx load balancer in front of the 3-node Warden cluster
  # Port 8000: TLS termination (nginx terminates TLS, forwards cert via header)
  # Port 8001: TLS passthrough (raw TLS stream forwarded to Warden)
  nginx:
    image: nginx:alpine
    container_name: e2e-nginx
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./loadbalancer/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./loadbalancer/certs:/etc/nginx/certs:ro
    networks:
      - e2e-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--no-check-certificate", "https://localhost:8000/nginx-health"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  e2e-network:
    driver: bridge
    name: e2e-warden-network

volumes:
  e2e-postgres-warden-data:
  e2e-postgres-hydra-data:
