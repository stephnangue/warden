version: "1.0.0"
title: "OpenBao policy hygiene audit"
description: "Audit every ACL policy on an OpenBao cluster via Warden for dead-mount references, orphan bindings, duplicates, and least-privilege smells. Publishes the report as a Slack channel canvas."

instructions: |
  You operate on Warden. To learn how, run

      warden skill read foundation -raw
      warden skill read discovery  -raw

  Browse the full catalog with `warden skill list -F name,description`.

  TASK — ACL policy hygiene audit

  Audit every ACL policy on the OpenBao cluster you reach via Warden.
  For each policy, emit findings in exactly these four categories — do
  not invent others. Cite the HCL line excerpt for every finding.

  DATA SOURCES — OpenBao API paths

  All four findings are derived from these OpenBao paths. Call each
  through the chosen vault provider/role gateway you picked during
  discovery; the per-path URL shape is in the `vault` skill. Do NOT
  invent other endpoints — the policy attached to your task role only
  grants these.

    | What you need              | OpenBao path                          |
    |----------------------------|---------------------------------------|
    | All ACL policy names       | `sys/policies/acl?list=true`          |
    | One policy body (HCL)      | `sys/policies/acl/<name>`             |
    | Secret mount paths         | `sys/mounts`                          |
    | Auth mount paths           | `sys/auth`                            |
    | All entity IDs             | `identity/entity/id?list=true`        |
    | One entity (name+policies) | `identity/entity/id/<id>`             |

  Skip built-in policies `default` and `root` — they're not in scope.

    1. dead_mount_reference
       A `path "<prefix>/*"` whose prefix does NOT match any mount from
       the cluster's secret-mount list or auth-mount list.
       Remediation: remove the stanza or restore the mount.

    2. orphan_binding
       The policy is attached to zero live entities AND is not a built-in
       (`default`, `root`).
       Remediation: delete or document its purpose.

    3. duplicate_or_contradictory_path
       Same `path "X"` declared twice in one policy, especially with
       differing capabilities.
       Remediation: merge into a single stanza.

    4. least_privilege_smell
       Any of:
         - `capabilities` list contains "sudo"
         - `path "*"` or `path "sys/*"` at top level
         - create/update/delete/patch on a glob path without
           a `condition` narrowing it
       Remediation: narrow path, drop sudo, add a CEL `condition`
       over request.data.

  Severity is deterministic, not subjective:
    - critical: any least_privilege_smell with "sudo" OR path "*"
    - warning:  any other finding
    - ok:       no findings

  DELIVERABLE — Slack channel canvas

  Publish the report as the destination channel's canvas. Build the
  Markdown file incrementally — one shell `cat >>` per policy — so
  the body never re-enters your context across LLM turns. A channel
  can carry at most one canvas, so replace any prior one.

  EFFICIENCY

  Pipe verbose JSON through `jq` to extract only the fields you need.
  Raw list outputs are large and accumulate across LLM turns, eating
  into the input-token rate limit.

prompt: |
  Run the full audit and publish the report. Build the Markdown file
  incrementally with shell calls — do NOT compose the full report in a
  single final assistant message. Your final message should be one short
  line confirming what you did.

  Sequence:

    1. Gather ground-truth: policy list, secret mounts, auth mounts,
       entity list, and per-entity {name, policies}. Build a
       policy → [entity_names] map mentally.

    2. Start the report file:
         printf '# OpenBao policy hygiene\n\n' > hygiene-report.md

    3. For each policy (skip built-ins `default` and `root`):
         a. Read the policy body.
         b. Analyse for the four finding categories above and derive
            severity.
         c. APPEND that policy's section to the file in one shell call:
              cat >> hygiene-report.md <<'EOF'
              ## <name> — <severity>
              Bound entities: <N>
              - **<category>**: `<line excerpt>` — <remediation>
              ...
              EOF
         d. Drop prior findings from your context — the file is the
            source of truth.

    4. Append a summary:
         cat >> hygiene-report.md <<'EOF'
         ## Summary
         Total: <N>, critical: <N>, warning: <N>, ok: <N>
         EOF

    5. Publish the report as the destination channel's canvas. Pipe the
       file via `jq --rawfile` so the markdown body never enters your
       context. Pass an explicit `title` (e.g.
       "OpenBao policy hygiene — $(date -u +%Y-%m-%d)") otherwise the
       canvas inherits the channel name.

    6. Final assistant message — one short line, e.g.
       "Audit complete: 8 policies; 1 critical, 4 warning, 3 ok. Canvas
       updated."

  Do NOT skip the canvas publish even if findings are zero.

extensions:
  - type: builtin
    name: developer
    description: "Shell + file tools so the agent can run CLIs and curl"

settings:
  goose_provider: anthropic
  # deepseek-chat = Flash in non-thinking mode. Thinking mode (deepseek-v4-flash
  # or deepseek-reasoner) needs Goose to round-trip thinking/reasoning_content
  # blocks, which it doesn't yet. Revisit before 2026-07-24 (deepseek-chat alias
  # retirement) — by then either Goose adds support or DeepSeek exposes a
  # disable-thinking param on deepseek-v4-flash.
  goose_model: deepseek-chat
